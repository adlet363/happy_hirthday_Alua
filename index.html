<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday Alua</title>
  <link rel="stylesheet" href="stiyl.css">
</head>
<body>
  <button id="startButton" class="start-button">Click for a surprise🎉</button>

  <div id="celebration" class="celebration hidden" aria-hidden="true">
    <img class="tt reveal" src="img/Apr 5, 2026, 12_39_25 AM.png" alt="Birthday image">
    <img class="ball reveal" src="img/pup-removebg-preview.png" alt="Balloon">
    <img class="ball-1 reveal" src="img/yellow-removebg-preview.png" alt="Balloon">
    <img class="ball-2 reveal" src="img/pup-removebg-preview.png" alt="Balloon">
    <img class="ball-3 reveal" src="img/yellow-removebg-preview.png" alt="Balloon">
    <div class="neon reveal">Happy Birthday!</div>
    <div class="neon-alua reveal">Alua</div>
    <div class="neon-h reveal">Happy</div>
    <div class="neon-b reveal">Birthday!</div>
    <div class="neon-Alua reveal">Alua</div>
  </div>

  <audio id="myAudio" src="audio/Happy_Birtday_Alua.mp3" loop></audio>

  <script>
    const colors = ['#ff00ff', '#0ff', '#ff0', '#f00', '#0f0', '#f90'];
    const startButton = document.getElementById('startButton');
    const celebration = document.getElementById('celebration');
    const audio = document.getElementById('myAudio');
    let fireworksIntervalId;

    function createFirework(x, y, color, count) {
      for (let i = 0; i < count; i++) {
        const ball = document.createElement('div');
        ball.className = 'firework';
        ball.style.left = x + 'px';
        ball.style.top = y + 'px';
        ball.style.backgroundColor = color;
        ball.style.boxShadow = `0 0 10px ${color}, 0 0 20px ${color}`;

        const angle = Math.random() * 2 * Math.PI;
        const distance = Math.random() * 200;
        const dx = Math.cos(angle) * distance + 'px';
        const dy = Math.sin(angle) * distance + 'px';
        ball.style.setProperty('--x', dx);
        ball.style.setProperty('--y', dy);

        document.body.appendChild(ball);
        setTimeout(() => ball.remove(), 1000);
      }
    }

    function startFireworks() {
      fireworksIntervalId = setInterval(() => {
        const x = Math.random() * window.innerWidth;
        const y = Math.random() * window.innerHeight / 2;
        const color = colors[Math.floor(Math.random() * colors.length)];
        createFirework(x, y, color, 40);
      }, 700);
    }

    startButton.addEventListener('click', () => {
      startButton.classList.add('hidden');
      celebration.classList.remove('hidden');
      celebration.setAttribute('aria-hidden', 'false');

      if (!fireworksIntervalId) {
        startFireworks();
      }

      audio.currentTime = 0;
      audio.play().catch(() => {
        // Если браузер заблокировал звук, повторная попытка возможна при следующем клике.
      });
    });
  </script>
</body>
</html>
