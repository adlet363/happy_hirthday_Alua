<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="/stiyl.css">
</head>
<body>
  <img class="tt" src="/img/Apr 5, 2026, 12_39_25 AM.png" alt="">
  <img class="ball" src="/img/pup-removebg-preview.png" alt="">
  <img class="ball-1" src="/img/yellow-removebg-preview.png" alt="">
  <img class="ball-2" src="/img/pup-removebg-preview.png" alt="">
  <img class="ball-3" src="/img/yellow-removebg-preview.png" alt="">
  <h1>Happy Birthday!</h1>
  <div class="neon">Happy Birthday!</div>
  <div class="neon-alua">Aula</div>
  <div class="neon-h">Happy</div>
  <div class="neon-b">Birthday!</div>
  <div class="neon-Alua">Alua</div>

  <audio id="myAudio" src="/audio/Happy_Birtday_Alua.mp3" loop autoplay></audio>


  <script>
    function createFirework(x, y, color, count) {
      for (let i = 0; i < count; i++) {
        const ball = document.createElement('div');
        ball.className = 'firework';
        ball.style.left = x + 'px';
        ball.style.top = y + 'px';
        ball.style.backgroundColor = color;
        ball.style.boxShadow = `0 0 10px ${color}, 0 0 20px ${color}`;
  
        // случайное направление
        const angle = Math.random() * 2 * Math.PI;
        const distance = Math.random() * 200; // увеличиваем дальность
        const dx = Math.cos(angle) * distance + 'px';
        const dy = Math.sin(angle) * distance + 'px';
        ball.style.setProperty('--x', dx);
        ball.style.setProperty('--y', dy);
  
        document.body.appendChild(ball);
  
        // удаляем после анимации
        setTimeout(() => ball.remove(), 1000);
      }
    }
  
    const colors = ['#ff00ff', '#0ff', '#ff0', '#f00', '#0f0', '#f90'];
  
    // создаём фейерверки чаще и больше
    setInterval(() => {
      const x = Math.random() * window.innerWidth;
      const y = Math.random() * window.innerHeight / 2;
      const color = colors[Math.floor(Math.random() * colors.length)];
      createFirework(x, y, color, 40); // 40 шариков вместо 20
    }, 700); // каждые 0.7 секунды

    const audio = document.getElementById("myAudio");
    const delay = 3000; // задержка (3 сек)
    const maxPlays = 2; // сколько раз проиграть
    let count = 0;

    function playWithLimit() {
     if (count >= maxPlays) return;

      audio.play();
      count++;

      audio.onended = () => {
        setTimeout(() => {
          audio.currentTime = 0;
          playWithLimit();
        }, delay);
      };
    }

    playWithLimit();
  </script>
</body>
</html>
